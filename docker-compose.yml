services:
  openrouter-webui:
    build: .
    image: ghcr.io/macsatcom/openrouter-local-webui:latest
    container_name: openrouter-webui
    ports:
      - "3000:3000"
    volumes:
      - openrouter-data:/app/data
      - openrouter-images:/app/generated-images
    environment:
      - DB_PATH=/app/data/chat.db
      - IMAGES_DIR=/app/generated-images
      - SESSION_SECRET=${SESSION_SECRET:-change-this-in-production}
    restart: unless-stopped

volumes:
  openrouter-data:
  openrouter-images:
