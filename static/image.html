<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Chat - Image Generation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="scrollable">
  <header class="header">
    <h1>Family Chat</h1>
    <nav>
      <a href="/chat">Chat</a>
      <a href="/image" class="active">Image Gen</a>
      <a href="/api/auth/logout" onclick="logout(event)">Logout</a>
    </nav>
    <div class="user-info">
      <span id="username"></span>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <h2>Generate Image</h2>
      <div class="model-select">
        <div class="model-picker">
          <input type="text" id="modelFilter" class="model-search" placeholder="Search models..." autocomplete="off">
          <div class="model-dropdown" id="modelDropdown"></div>
          <input type="hidden" id="modelSelect" value="">
        </div>
      </div>
      <div class="form-group">
        <label>Prompt</label>
        <textarea id="prompt" rows="3" placeholder="Describe the image you want to generate..."></textarea>
      </div>
      <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
          <label>Aspect Ratio</label>
          <select id="aspectRatio">
            <option value="1:1">1:1 (Square)</option>
            <option value="16:9">16:9 (Landscape)</option>
            <option value="9:16">9:16 (Portrait)</option>
            <option value="4:3">4:3 (Standard)</option>
            <option value="3:4">3:4 (Portrait)</option>
            <option value="21:9">21:9 (Ultrawide)</option>
          </select>
        </div>
      </div>
      <button class="btn" id="generateBtn">Generate</button>
      <div id="status" style="margin-top: 10px;"></div>
    </div>

    <div class="card">
      <h2>Your Generated Images</h2>
      <div class="image-grid" id="imageGrid"></div>
      <div id="loadMore" style="text-align: center; margin-top: 20px;">
        <button class="btn" id="loadMoreBtn">Load More</button>
      </div>
    </div>
  </div>

  <script src="/js/image.js"></script>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightboxImg" src="">
</div>
  <script>
    async function logout(e) {
      e.preventDefault();
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }
    document.getElementById('username').textContent = localStorage.getItem('username') || '';
  </script>
</body>
</html>
