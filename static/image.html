<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#141414">
  <link rel="manifest" href="/manifest.json">
  <script>(function(){var t=localStorage.getItem('theme');if(t){document.documentElement.dataset.theme=t;var m=document.querySelector('meta[name=\"theme-color\"]');if(m)m.content=t==='light'?'#f5f3f0':'#141414';}})();</script>
  <title>OpenRouter Local WebUI - Image Generation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="scrollable">
  <header class="header">
    <h1>OpenRouter Local WebUI</h1>
    <nav>
      <a href="/chat">Chat</a>
      <a href="/image" class="active">Image Gen</a>
      <a href="/video">Video Gen<span class="nav-badge hidden" id="videoBadge"></span></a>
      <a href="/api/auth/logout" onclick="logout(event)">Logout</a>
    </nav>
    <div class="user-info">
      <span id="username"></span>
      <select id="themeSelect" class="theme-select">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
      <a href="/admin" class="admin-link hidden" id="adminLink">Admin</a>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <h2>Generate Image</h2>

      <div class="model-select">
        <div class="model-picker">
          <input type="text" id="modelFilter" class="model-search" placeholder="Search models..." autocomplete="off">
          <div class="model-dropdown" id="modelDropdown"></div>
          <input type="hidden" id="modelSelect" value="">
        </div>
      </div>

      <div class="form-group">
        <label for="prompt">Prompt</label>
        <textarea id="prompt" rows="3" placeholder="Describe the image you want to generate..."></textarea>
      </div>

      <div class="form-group" id="refImageGroup">
        <label>Reference Image</label>
        <div class="ref-image-area" id="refImageArea">
          <input type="file" id="refImageInput" accept="image/png,image/jpeg,image/webp" hidden>
          <button class="btn btn-ghost" id="refImageBtn" type="button">Upload image</button>
          <span class="text-muted" id="refImageHint">Optional — attach a reference for editing</span>
          <div class="ref-image-preview hidden" id="refImagePreview">
            <img id="refImagePreviewImg" src="">
            <button class="ref-image-remove" id="refImageRemove" type="button">&times;</button>
          </div>
        </div>
      </div>

      <div id="editOptions" class="hidden" style="margin-bottom: 14px;">
        <label class="toggle-row">
          <input type="checkbox" id="editToggle">
          <span>Edit from reference</span>
        </label>
      </div>

      <div class="options-group">
        <button class="options-toggle" id="optionsToggle" type="button">Options</button>
        <div class="options-panel hidden" id="optionsPanel">
          <div class="options-grid">
            <div class="form-group">
              <label for="quality">Quality</label>
              <select id="quality">
                <option value="auto">Auto</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="form-group">
              <label for="size">Size</label>
              <select id="size">
                <option value="auto">Auto</option>
                <option value="1024x1024">1024×1024</option>
                <option value="1024x1536">1024×1536</option>
                <option value="1536x1024">1536×1024</option>
              </select>
            </div>
            <div class="form-group">
              <label for="aspectRatio">Aspect Ratio</label>
              <select id="aspectRatio">
                <option value="auto">Auto</option>
                <option value="1:1">1:1 (Square)</option>
                <option value="16:9">16:9 (Landscape)</option>
                <option value="9:16">9:16 (Portrait)</option>
                <option value="4:3">4:3 (Standard)</option>
                <option value="3:4">3:4 (Portrait)</option>
                <option value="21:9">21:9 (Ultrawide)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="outputFormat">Format</label>
              <select id="outputFormat">
                <option value="auto">Auto</option>
                <option value="png">PNG</option>
                <option value="webp">WebP</option>
                <option value="jpeg">JPEG</option>
              </select>
            </div>
            <div class="form-group">
              <label for="background">Background</label>
              <select id="background">
                <option value="auto">Auto</option>
                <option value="transparent">Transparent</option>
                <option value="opaque">Opaque</option>
              </select>
            </div>
            <div class="form-group">
              <label for="inputFidelity">Input Fidelity</label>
              <select id="inputFidelity">
                <option value="">Auto</option>
                <option value="high">High</option>
                <option value="low">Low</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" id="generateBtn" style="width:100%">Generate</button>
      <div id="status" style="margin-top: 10px;"></div>
    </div>

    <div class="card">
      <h2>Your Generated Images</h2>
      <div class="image-grid" id="imageGrid"></div>
      <div id="loadMore" style="text-align: center; margin-top: 20px;">
        <button class="btn" id="loadMoreBtn">Load More</button>
      </div>
    </div>
  </div>

  <script src="/js/image.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightboxImg" src="">
</div>
  <script>
    async function logout(e) {
      e.preventDefault();
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }
    document.getElementById('username').textContent = localStorage.getItem('username') || '';
    (function(){
      var sel = document.getElementById('themeSelect');
      var meta = document.querySelector('meta[name="theme-color"]');
      if (sel) {
        sel.value = localStorage.getItem('theme') || 'dark';
        sel.addEventListener('change', function(){
          document.documentElement.dataset.theme = sel.value;
          localStorage.setItem('theme', sel.value);
          if (meta) meta.content = sel.value === 'light' ? '#f5f3f0' : '#141414';
        });
      }
    })();
  </script>
<script>
(function pollVideoBadge() {
  fetch('/api/video/notifications').then(function(r){return r.json()}).then(function(data){
    var badge = document.getElementById('videoBadge');
    if (badge) {
      if (data.count > 0) { badge.textContent = data.count; badge.classList.remove('hidden'); }
      else { badge.classList.add('hidden'); }
    }
  }).catch(function(){});
  setTimeout(pollVideoBadge, 10000);
})();
</script>
</body>
</html>
